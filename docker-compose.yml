version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: franquicias_db
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: franquicias_app
    ports:
      - "8080:8080"
    depends_on:
      - mysql